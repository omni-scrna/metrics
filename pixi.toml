[workspace]
channels = ["conda-forge", "bioconda"]
name = "metrics"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) scrapper.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' scrapper.yml"

[dependencies]
# Python
python = ">=3.14.4,<3.15"
scikit-learn = "*"
numpy = "*"
polars = "*"
# R
r-base = ">=4.5"
r-argparse = "*"
r-jsonlite = "*"
"r-data.table" = "*"
bioconductor-biocversion = "3.22.*"
bioconductor-poem = "*"
bioconductor-rhdf5 = "*"
r-igraph = "*"
r-matrix = "*"
